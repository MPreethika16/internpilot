&gt; **_Seeing Systems is building autonomous drone systems that can perceive, navigate, and act intelligently in complex real-world environments._**

We focus on advancing autonomy through **monocular vision, sensor fusion, and robust system design**, enabling drones to operate reliably where traditional systems fail.

Seeing Systems was founded by brothers **Matthew and Alex Le Maitre**, combining deep experience across software, robotics, and defense. Matthew is a former Jane Street engineer and top-ranked computer science graduate from the University of Cambridge, with a background in autonomous systems research. Alexander is a self-taught hardware engineer who has been building unmanned systems and military-grade electronics from a young age, including work on explosive ordnance and national security projects.

We are an early-stage, fast-moving team working at the intersection of robotics, perception, and real-world deployment.

---

## **The Role**

We’re hiring a **Software Engineering Intern** to help design and build the core autonomy stack powering our drones. This is a deeply technical, hands-on role where you’ll work across perception, planning, and systems infrastructure—owning critical pieces of the product from day one.

You’ll partner directly with the founders to define architecture, make key technical decisions, and ship systems that perform reliably both in simulation and in the field.

---

## **What You'll Do**

* Design and build core components of the autonomous drone stack
* Develop perception and state estimation systems using **monocular vision and sensor fusion**
* Work with and extend robotics frameworks like **ROS / ROS2**
* Build and test algorithms in simulation environments such as **AirSim**, and deploy to real systems
* Implement and optimize **SLAM**, localization, and navigation pipelines
* Interface with sensors, compute systems, and flight controllers
* Contribute to system architecture across software, hardware, and communications layers
* Rapidly prototype, test in the field, and iterate on real-world performance
* Leverage modern AI tools and workflows to accelerate development and experimentation
* Help define engineering culture, tooling, and hiring as a founding team member

Within your first 30 days, you'll deploy your first vision-based navigation update to a physical drone and test in the field, and within 90 days, you’ll be co-owner of our internal autonomy stack, responsible for large-scale development and direction of our primary software product.

---

## **What We're Looking For**

* Strong software engineering skills, with **Python preferred** (C++, Rust or OCaml is a plus)
* Experience building robotics, real-time, or distributed systems
* Familiarity with **ROS / ROS2** and working across simulation + hardware
* Strong intuition for systems, debugging, and performance tradeoffs
* Comfortable operating in ambiguity and moving quickly in a startup environment
* High **ownership mindset**—you build, test, and ship end-to-end
* **Heavy user of AI tools** (e.g., claude code) to accelerate output
* Willing to go outside with us and test in the real world!

---

## **Nice to Have**

* Experience with **SLAM**, visual odometry, or 3D reconstruction
* Background in **computer vision** (especially monocular/depth estimation)
* Experience with **sensor fusion** (e.g., IMU + camera, Kalman filters)
* Familiarity with **AirSim** or similar simulation platforms
* Experience working with drones, UAV systems, or embedded systems
* RF or communications systems experience
* Prior startup or founding engineer experience

---

## **Why Join**

* Founding-level ownership
* Opportunity to build cutting-edge autonomous systems from first principles
* Work on real-world robotics problems with immediate, tangible impact
* Tight iteration loop between simulation and deployment
* Small, high-agency team moving quickly

---

 Alex Le Maitre\u003c/strong\u003e, combining deep experience across software, robotics, and defense. Matthew is a former Jane Street engineer and top-ranked computer science graduate from the University of Cambridge, with a background in autonomous systems research. Alexander is a self-taught hardware engineer who has been building unmanned systems and military-grade electronics from a young age, including work on explosive ordnance and national security projects.\u003c/p\u003e\n\u003cp\u003eWe are an early-stage, fast-moving team working at the intersection of robotics, perception, and real-world deployment.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003eThe Role\u003c/strong\u003e\u003c/h2\u003e\n\u003cp\u003eWe’re hiring a \u003cstrong\u003eSoftware Engineering Intern\u003c/strong\u003e to help design and build the core autonomy stack powering our drones. This is a deeply technical, hands-on role where you’ll work across perception, planning, and systems infrastructure—owning critical pieces of the product from day one.\u003c/p\u003e\n\u003cp\u003eYou’ll partner directly with the founders to define architecture, make key technical decisions, and ship systems that perform reliably both in simulation and in the field.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003eWhat You'll Do\u003c/strong\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDesign and build core components of the autonomous drone stack\u003c/li\u003e\n\u003cli\u003eDevelop perception and state estimation systems using \u003cstrong\u003emonocular vision and sensor fusion\u003c/strong\u003e\n\u003c/li\u003e\n\u003cli\u003eWork with and extend robotics frameworks like \u003cstrong\u003eROS / ROS2\u003c/strong\u003e\n\u003c/li\u003e\n\u003cli\u003eBuild and test algorithms in simulation environments such as \u003cstrong\u003eAirSim\u003c/strong\u003e, and deploy to real systems\u003c/li\u003e\n\u003cli\u003eImplement and optimize \u003cstrong\u003eSLAM\u003c/strong\u003e, localization, and navigation pipelines\u003c/li\u003e\n\u003cli\u003eInterface with sensors, compute systems, and flight controllers\u003c/li\u003e\n\u003cli\u003eContribute to system architecture across software, hardware, and communications layers\u003c/li\u003e\n\u003cli\u003eRapidly prototype, test in the field, and iterate on real-world performance\u003c/li\u003e\n\u003cli\u003eLeverage modern AI tools and workflows to accelerate development and experimentation\u003c/li\u003e\n\u003cli\u003eHelp define engineering culture, tooling, and hiring as a founding team member\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWithin your first 30 days, you'll deploy your first vision-based navigation update to a physical drone and test in the field, and within 90 days, you’ll be co-owner of our internal autonomy stack, responsible for large-scale development and direction of our primary software product.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003eWhat We're Looking For\u003c/strong\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eStrong software engineering skills, with \u003cstrong\u003ePython preferred\u003c/strong\u003e (C++, Rust or OCaml is a plus)\u003c/li\u003e\n\u003cli\u003eExperience building robotics, real-time, or distributed systems\u003c/li\u003e\n\u003cli\u003eFamiliarity with \u003cstrong\u003eROS / ROS2\u003c/strong\u003e and working across simulation + hardware\u003c/li\u003e\n\u003cli\u003eStrong intuition for systems, debugging, and performance tradeoffs\u003c/li\u003e\n\u003cli\u003eComfortable operating in ambiguity and moving quickly in a startup environment\u003c/li\u003e\n\u003cli\u003eHigh \u003cstrong\u003eownership mindset\u003c/strong\u003e—you build, test, and ship end-to-end\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eHeavy user of AI tools\u003c/strong\u003e (e.g., claude code) to accelerate output\u003c/li\u003e\n\u003cli\u003eWilling to go outside with us and test in the real world!\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003eNice to Have\u003c/strong\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eExperience with \u003cstrong\u003eSLAM\u003c/strong\u003e, visual odometry, or 3D reconstruction\u003c/li\u003e\n\u003cli\u003eBackground in \u003cstrong\u003ecomputer vision\u003c/strong\u003e (especially monocular/depth estimation)\u003c/li\u003e\n\u003cli\u003eExperience with \u003cstrong\u003esensor fusion\u003c/strong\u003e (e.g., IMU + camera, Kalman filters)\u003c/li\u003e\n\u003cli\u003eFamiliarity with \u003cstrong\u003eAirSim\u003c/strong\u003e or similar simulation platforms\u003c/li\u003e\n\u003cli\u003eExperience working with drones, UAV systems, or embedded systems\u003c/li\u003e\n\u003cli\u003eRF or communications systems experience\u003c/li\u003e\n\u003cli\u003ePrior startup or founding engineer experience\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003eWhy Join\u003c/strong\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eFounding-level ownership\u003c/li\u003e\n\u003cli\u003eOpportunity to build cutting-edge autonomous systems from first principles\u003c/li\u003e\n\u003cli\u003eWork on real-world robotics problems with immediate, tangible impact\u003c/li\u003e\n\u003cli\u003eTight iteration loop between simulation and deployment\u003c/li\u003e\n\u003cli\u003eSmall, high-agency team moving quickly\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003eIf you’re excited about building autonomous systems that operate in the real world—and want to help define the future of drone intelligence—we’d love to talk.\u003c/p\u003e\n&quot;,&quot;interviewProcessHtml&quot;:null},&quot;company&quot;:{&quot;name&quot;:&quot;Seeing Systems&quot;,&quot;slug&quot;:&quot;seeing-systems&quot;,&quot;batch&quot;:&quot;W26&quot;,&quot;description&quot;:&quot;Modular AI-Commanded Drones for Defence&quot;,&quot;hiringDescriptionHtml&quot;:&quot;\u003cp\u003eSeeing Systems is a small, NATO-focused defence startup, specialising in development of, and training on small unmanned aircraft systems (sUAS) and AI-enabled embedded swarm systems. We’ve worked with UK Commando Royal Marines, Estonian Military, Luxembourg Army, among others.\u003c/p\u003e\n\u003cp\u003eWe are currently working with a US manufacturer to produce our next-generation one-way effector drone, along with our own control system, breaking the current 1:1 operator-to-drone ratio with a unique usability-first approach, allowing full swarm autonomy for pilots with no prior training or experience.\u003c/p\u003e\n&quot;,&quot;techDescriptionHtml&quot;:&quot;\u003cp\u003ePython, Rust, OCaml, ROS, AirSim, World Models, MAVLink, SLAM\u003c/p\u003e\n&quot;,&quot;logoUrl&quot;:&quot;https://bookface-images.s3.amazonaws.com/small_logos/8d8e226478cb43c163b19e22186c3bab3bdb9668.png&quot;,&quot;url&quot;:&quot;https://www.seeing-systems.com&quot;,&quot;location&quot;:&quot;London, United Kingdom&quot;,&quot;teamSize&quot;:2,&quot;industry&quot;:&quot;Industrials -\u003e Defense&quot;,&quot;founders&quot;:[{&quot;name&quot;:&quot;Matthew Le Maitre&quot;,&quot;avatarUrl&quot;:&quot;https://bookface-images.s3.amazonaws.com/avatars/db02b50873d95d057676e7071ea66492a4dce742.jpg&quot;,&quot;bio&quot;:&quot;Ex-Jane Street SWE, Top-Ranked CS Grad @ Cambridge, now building Defence Tech.\n\nPhysicist → Researcher → Consultant → Software Engineer → Founder 🚀\n\nTrying never to lose my inner child, whilst building things that really matter.&quot;,&quot;pastCompanies&quot;:null,&quot;linkedin&quot;:&quot;https://www.linkedin.com/in/mattlemaitre/&quot;},{&quot;name&quot;:&quot;Alexander Le Maitre&quot;,&quot;avatarUrl&quot;:&quot;https://bookface-images.s3.amazonaws.com/avatars/ddba90120d950889505bd3c360846048249d8f03.jpg&quot;,&quot;bio&quot;:&quot;I've been obsessed with unmanned systems since I was a kid. Nobody was going to teach me embedded electronics or PCB design, so I taught myself.\n\nSince then, I've built Explosive Ordnance Disposal (EOD) training and diagnostic hardware for militaries - plus a few projects I'm still not allowed to talk about. I've trained special forces in fifth-generation warfare and modern IED tech.\n\nI'm from a small island called Guernsey. These days I run a company building tech that keeps the country safe.&quot;,&quot;pastCompanies&quot;:null,&quot;linkedin&quot;:&quot;https://www.linkedin.com/in/alexander-le-maitre-a9138a159/&quot;}],&quot;jobs&quot;:[{&quot;id&quot;:94035,&quot;title&quot;:&quot;Founding Hardware Engineer&quot;,&quot;location&quot;:&quot;London, England, GB&quot;,&quot;jobType&quot;:&quot;Full-time&quot;,&quot;salaryRange&quot;:&quot;£60K - £120K GBP&quot;,&quot;equityRange&quot;:&quot;0.25% - 1.00%&quot;,&quot;sponsorsVisa&quot;:&quot;US citizenship/visa not required&quot;,&quot;minExperience&quot;:&quot;Any (new grads ok)&quot;},{&quot;id&quot;:92991,&quot;title&quot;:&quot;Founding Software Engineer&quot;,&quot;location&quot;:&quot;London, England, GB&quot;,&quot;jobType&quot;:&quot;Full-time&quot;,&quot;salaryRange&quot;:&quot;£60K - £120K GBP&quot;,&quot;equityRange&quot;:&quot;0.25% - 1.00%&quot;,&quot;sponsorsVisa&quot;:&quot;US citizenship/visa not required&quot;,&quot;minExperience&quot;:&quot;Any (new grads ok)&quot;},{&quot;id&quot;:94623,&quot;title&quot;:&quot;Software Engineering Intern&quot;,&quot;location&quot;:&quot;London, England, GB / Christchurch, England, GB&quot;,&quot;jobType&quot;:&quot;Internship&quot;,&quot;salaryRange&quot;:&quot;£4.5K - £7.5K GBP / monthly&quot;,&quot;equityRange&quot;:null,&quot;sponsorsVisa&quot;:&quot;US citizenship/visa not required&quot;,&quot;minExperience&quot;:null},{&quot;id&quot;:94262,&quot;title&quot;:&quot;Electrical Engineering Intern&quot;,&quot;location&quot;:&quot;London, England, GB&quot;,&quot;jobType&quot;:&quot;Internship&quot;,&quot;salaryRange&quot;:&quot;£4.5K - £7.5K GBP / monthly&quot;,&quot;equityRange&quot;:null,&quot;sponsorsVisa&quot;:&quot;US citizenship/
